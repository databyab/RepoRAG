services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/raw_repos:/app/data/raw_repos
      - ./backend/data/vector_store:/app/data/vector_store
    # Resource limits for security
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    # Resource limits for security
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
